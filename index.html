<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | flappy</title>
  </head>
  <body style="text-align: center; padding: 0; border: 0; margin: 0;">
    <canvas id="unity-canvas" width=960 height=600 tabindex="-1" style="width: 960px; height: 600px; background: #1F1F20"></canvas>
    <script src="Build/gs.loader.js"></script>

    <script>
      var unityInstance;  // Создаем глобальную переменную unityInstance

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";

        document.body.style.textAlign = "left";
      }

      unityInstance = createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/gs.data.unityweb",
        frameworkUrl: "Build/gs.framework.js.unityweb",
        codeUrl: "Build/gs.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "flappy",
        productVersion: "1.0",
      });
    </script>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
      import { getDatabase, ref, set, get, child } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js';
  
      const firebaseConfig = {
          apiKey: "AIzaSyBEuWHhTt7YD-3_vOXlVdu0LzTm4e95rm0",
          authDomain: "rocketvoy.firebaseapp.com",
          databaseURL: "https://rocketvoy-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "rocketvoy",
          storageBucket: "rocketvoy.appspot.com",
          messagingSenderId: "363023542878",
          appId: "1:363023542878:web:210264407ad5dfe111a2cf",
          measurementId: "G-SD6ZYT9NQD"
      };
  
      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const database = getDatabase(app);
  
      // Function to write data to Firebase
      window.writeDataToFirebase = function(path, data) {
          set(ref(database, path), JSON.parse(data))
              .then(() => console.log('Data written successfully'))
              .catch((error) => console.error('Error writing data:', error));
      };
  
      // Function to read data from Firebase
      window.readDataFromFirebase = function(path) {
          get(child(ref(database), path))
              .then((snapshot) => {
                  if (snapshot.exists()) {
                      const data = snapshot.val();
                      // Make sure unityInstance is defined before calling SendMessage
                      if (unityInstance !== undefined) {
                          unityInstance.SendMessage('firebasework', 'OnFirebaseDataReceived', JSON.stringify(data));
                      } else {
                          console.error('unityInstance is not defined');
                      }
                  } else {
                      console.log('No data available');
                  }
              })
              .catch((error) => console.error('Error reading data:', error));
      };
    </script>
  </body>
</html>
